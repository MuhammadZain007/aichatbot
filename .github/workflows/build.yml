name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git ffmpeg \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev \
            zlib1g-dev openjdk-17-jdk autoconf libtool pkg-config \
            python3-pip cmake

      - name: Install buildozer & python-for-android
        run: |
          pip install --upgrade pip setuptools
          pip install buildozer "cython<3" virtualenv

      - name: Build APK
        run: |
          cd $GITHUB_WORKSPACE
          yes | buildozer android debug
      
      - name: Find APK
        run: |
          echo "Looking for APK files..."
          find $GITHUB_WORKSPACE -name "*.apk" -type f 2>/dev/null
          mkdir -p $GITHUB_WORKSPACE/output
          find $GITHUB_WORKSPACE -name "*.apk" -type f -exec cp {} $GITHUB_WORKSPACE/output/ \;
          ls -la $GITHUB_WORKSPACE/output/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AI-ChatBot-APK
          path: output/*.apk
          if-no-files-found: warn
