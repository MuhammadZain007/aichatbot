name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git ffmpeg \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev \
            zlib1g-dev openjdk-17-jdk autoconf libtool pkg-config \
            python3-pip cmake wget unzip

      - name: Install Buildozer & python-for-android
        run: |
          pip install --upgrade pip setuptools
          pip install "buildozer==1.5.0" "python-for-android==2024.01.21" "cython<3" virtualenv

      - name: Install Android SDK Command Line Tools
        run: |
          mkdir -p $HOME/Android/Sdk/cmdline-tools
          cd $HOME/Android/Sdk/cmdline-tools
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
          unzip cmdline-tools.zip
          rm cmdline-tools.zip
          mv cmdline-tools latest

      - name: Accept Android SDK licenses
        run: |
          yes | $HOME/Android/Sdk/cmdline-tools/latest/bin/sdkmanager --licenses
          $HOME/Android/Sdk/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "ndk;25.2.9519653"

      - name: Set Environment Variables
        run: |
          echo "ANDROID_HOME=$HOME/Android/Sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/Android/Sdk" >> $GITHUB_ENV
          echo "ANDROIDSDK=$HOME/Android/Sdk" >> $GITHUB_ENV
          echo "ANDROIDNDK=$HOME/Android/Sdk/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$HOME/Android/Sdk/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "PATH=$PATH:$HOME/Android/Sdk/platform-tools:$HOME/Android/Sdk/cmdline-tools/latest/bin" >> $GITHUB_ENV

      - name: Build APK
        run: |
          cd $GITHUB_WORKSPACE
          buildozer android debug

      - name: Find APK
        run: |
          echo "Looking for APK files..."
          mkdir -p $GITHUB_WORKSPACE/output
          find $GITHUB_WORKSPACE -name "*.apk" -type f -exec cp {} $GITHUB_WORKSPACE/output/ \;
          ls -la $GITHUB_WORKSPACE/output/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AI-ChatBot-APK
          path: output/*.apk
          if-no-files-found: warn